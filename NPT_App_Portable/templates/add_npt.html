{% extends "base.html" %}
{% block title %}Add NPT{% endblock %}

{% block content %}
<h4 class="mb-3">Add NPT Entry</h4>

<div class="card p-4 col-md-6">
<form method="post">
  <input type="date" name="Date" class="form-control mb-3" style="color: #fff;" required>

  <input type="text" name="Category" placeholder="Category" class="form-control mb-3" required>

  <input type="text" name="Department" placeholder="Department" class="form-control mb-3" required>

  <input type="text" name="Equipment" placeholder="Equipment" class="form-control mb-3" required>

  <input type="number" step="0.1" name="Time" placeholder="Time (hrs)" class="form-control mb-3" required>

  <textarea name="Reason" class="form-control mb-3" placeholder="Reason"></textarea>

  <button class="btn btn-warning w-100">Save NPT</button>
</form>
</div>

{% endblock %}
