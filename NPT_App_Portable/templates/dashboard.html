{% extends "base.html" %}
{% block title %}Dashboard | NPT{% endblock %}

{% block content %}

<h3 class="mb-4">NPT Analytics Dashboard</h3>

<div class="row mb-4">
  <div class="col-md-3">
    <div class="card p-3">
      <small class="text-secondary">Total NPT (hrs)</small>
      <h2 class="text-danger">{{ total_npt }}</h2>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card p-3">
      <small class="text-secondary">Average NPT</small>
      <h2 class="text-warning">{{ avg_npt }}</h2>
    </div>
  </div>
</div>

<div class="card p-4 mb-4" style="height: 800px; overflow-x: auto;">
  <h6 style="color: antiquewhite;">Overall NPT Trend</h6>
  <div style="min-width: 98%; position: relative;">
    <canvas id="barChart" style="display: block;"></canvas>
  </div>
</div>

<div class="row">
  <div class="col-md-6">
    <div class="card p-4">
      <h6 style="color: antiquewhite;">Equipment-wise NPT</h6>
      <canvas id="equipBar"></canvas>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card p-4">
      <h6 style="color: antiquewhite;">Department-wise NPT</h6>
      <canvas id="deptPie"></canvas>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script>
const barLabels = {{ date_data | map(attribute='Date') | list | tojson }}.map(d => d.split(' ')[0]);
const barValues = {{ date_data | map(attribute='total') | list | tojson }};

Chart.register(ChartDataLabels);

const barCtx = document.getElementById('barChart');
const minWidth = Math.max(barLabels.length * 25, barCtx.parentElement.clientWidth - 40);
barCtx.style.minWidth = minWidth + 'px';

new Chart(barCtx, {
  type: "bar",
  data: {
    labels: barLabels,
    datasets: [{
      label: "NPT (hrs)",
      data: barValues,
      backgroundColor: "#f97316",
      borderColor: "#ea580c",
      borderWidth: 0,
      borderRadius: 2,
      barThickness: 'flex',
      maxBarThickness: 10
    }]
  },
  options: {
    indexAxis: "x",
    responsive: true,
    maintainAspectRatio: true,
    scales: {
      y: {
        beginAtZero: true,
        ticks: { color: "#9ca3af" },
        grid: { color: "#1f2937", drawBorder: false }
      },
      x: {
        ticks: { color: "#9ca3af" },
        grid: { color: "#1f2937", drawBorder: false }
      }
    },
    plugins: {
      legend: { 
        display: true,
        labels: { color: "#ffff ", font: { size: 10 } }
      },
      datalabels: {
        color: "#fff",
        font: { weight: "bold", size: 10 },
        anchor: "end",
        align: "top",
        offset: 2,
        formatter: (value) => {
          return value.toFixed(1);
        }
      },
      tooltip: {
        backgroundColor: "#111827",
        titleColor: "#fff",
        bodyColor: "#e5e7eb",
        borderColor: "#f97316",
        borderWidth: 1
      }
    }
  }
});

const equipLabels = {{ equip_data | map(attribute='Equipment') | list | tojson }};
const equipValues = {{ equip_data | map(attribute='total') | list | tojson }};
const equipColors = {{ equip_colors | tojson }};

new Chart(equipBar, {
  type: "bar",
  data: {
    labels: equipLabels,
    datasets: [{
      label: "NPT (hrs)",
      data: equipValues,
      backgroundColor: equipColors,
      borderColor: equipColors,
      borderWidth: 0,
      borderRadius: 4
    }]
  },
  options: {
    indexAxis: "y",
    responsive: true,
    interaction: {
      mode: 'index',
      intersect: false
    },
    scales: {
      x: {
        beginAtZero: true,
        ticks: { color: "#9ca3af" },
        grid: { color: "#1f2937", drawBorder: false }
      },
      y: {
        ticks: { color: "#9ca3af" },
        grid: { color: "#1f2937", drawBorder: false }
      }
    },
    plugins: {
      legend: {
        display: true,
        position: "top",
        labels: { color: "#9ca3af", padding: 15, font: { size: 11 } }
      },
      datalabels: {
        color: "#fff",
        font: { weight: "bold", size: 12 },
        anchor: "end",
        align: "end",
        offset: 5,
        formatter: (value) => {
          return value.toFixed(1) + " hrs";
        }
      },
      tooltip: {
        backgroundColor: "#111827",
        titleColor: "#fff",
        bodyColor: "#e5e7eb",
        borderColor: "#f97316",
        borderWidth: 1,
        caretPadding: 10,
        displayColors: true
      }
    }
  }
});

const deptLabels = {{ dept_data | map(attribute='Department') | list | tojson }};
const deptValues = {{ dept_data | map(attribute='total') | list | tojson }};
const deptColors = {{ dept_colors | tojson }};

new Chart(deptPie, {
  type: "doughnut",
  data: {
    labels: deptLabels,
    datasets: [{
      data: deptValues,
      backgroundColor: deptColors
    }]
  },
  options: {
    responsive: true,
    cutout: "70%",
    plugins: {
      legend: {
        position: "right",
        labels: {
          color: "#9ca3af",
          padding: 20,
          font: { size: 11 }
        }
      },

      // ❌ Disable all in-chart labels
      datalabels: {
        display: false
      },

      // ✅ Hover-only percentage
      tooltip: {
        backgroundColor: "#111827",
        titleColor: "#ffffff",
        bodyColor: "#e5e7eb",
        borderColor: "#f97316",
        borderWidth: 1,
        callbacks: {
          label: function(ctx) {
            const value = ctx.raw;
            const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
            const percent = ((value / total) * 100).toFixed(1);
            return `${ctx.label}: ${percent}% (${value} hrs)`;
          }
        }
      }
    }
  }
});
</script>

{% endblock %}
