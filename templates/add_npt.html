{% extends "base.html" %}
{% block content %}

<h4>Add NPT Record</h4>

<form method="post">
  <div class="row">
    <div class="col-md-3">
      <label>Date</label>
      <input type="date" name="npt_date" class="form-control" required>
    </div>

    <div class="col-md-2">
      <label>Day No</label>
      <input type="number" name="day_no" class="form-control">
    </div>

    <div class="col-md-3">
      <label>NPT Category</label>
      <input type="text" name="npt_category" class="form-control">
    </div>
  </div>

  <br>

  <div class="row">
    <div class="col-md-3">
      <label>Department</label>
      <input type="text" name="department" class="form-control">
    </div>

    <div class="col-md-3">
      <label>Equipment</label>
      <input type="text" name="equipment" class="form-control">
    </div>

    <div class="col-md-2">
      <label>NPT Hours</label>
      <input type="number" step="0.01" name="npt_hours" class="form-control">
    </div>

    <div class="col-md-4">
      <label>Time Period</label>
      <input type="text" name="time_period" class="form-control">
    </div>
  </div>

  <br>

  <textarea name="reason" class="form-control" placeholder="Reason"></textarea>
  <br>
  <textarea name="remarks" class="form-control" placeholder="Remarks"></textarea>

  <br>
  <button class="btn btn-primary">Save NPT</button>
</form>

{% endblock %}
