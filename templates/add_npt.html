{% extends "base.html" %}
{% block content %}

<h4>Add NPT Record</h4>

<form method="post">
  <div class="row">
    <div class="col-md-3">
      <label>Date</label>
      <input type="date" name="Date" class="form-control" required>
    </div>

    <div class="col-md-3">
      <label>NPT Category</label>
      <input type="text" name="Category" class="form-control">
    </div>
  </div>

  <br>

  <div class="row">
    <div class="col-md-3">
      <label>Department</label>
      <input type="text" name="Department" class="form-control">
    </div>

    <div class="col-md-3">
      <label>Equipment</label>
      <input type="text" name="Equipment" class="form-control">
    </div>

    <div class="col-md-2">
      <label>NPT Hours</label>
      <input type="number" step="0.01" name="Time" class="form-control">
    </div>
  </div>

  <br>

  <textarea name="Reason" class="form-control" placeholder="Reason"></textarea>
  <br>

  <button class="btn btn-primary">Save NPT</button>
</form>


{% endblock %}
