<!DOCTYPE html>
<html>
<head>
    <title>NPT Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">NPT DRILLING SYSTEM</a>
    <div>
        <a class="btn btn-success btn-sm" href="/add">Add NPT</a>
        <a class="btn btn-info btn-sm" href="/dashboard">Dashboard</a>
        <a class="btn btn-info btn-sm" href="/">View NPT</a>
        <a class="btn btn-success mb-2"
        href="{{ url_for('download_excel',
                from_date=request.args.get('from_date'),
                to_date=request.args.get('to_date'),
                department=request.args.get('department'),
                equipment=request.args.get('equipment')) }}">
        Download Excel
        </a>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
